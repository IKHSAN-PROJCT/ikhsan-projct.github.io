<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background: rgba(0,0,0,0.1); /* debug tipis */
}

video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  transform: scaleX(-1); /* mirror FIX */
}

canvas {
  position:absolute;
  width:100%;
  height:100%;
}
</style>

</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// =========================
// HITUNG JARI (FIX ORIENTATION)
// =========================
function countFingers(lm) {
  let count = 0;

  // Thumb (dibalik karena mirror)
  if (lm[4].x < lm[3].x) count++;

  if (lm[8].y < lm[6].y) count++;
  if (lm[12].y < lm[10].y) count++;
  if (lm[16].y < lm[14].y) count++;
  if (lm[20].y < lm[18].y) count++;

  return count;
}

let cooldown = false;

// =========================
// MEDIAPIPE
// =========================
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

// =========================
// DETEKSI
// =========================
hands.onResults(results => {

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(results.multiHandLandmarks){

    const lm = results.multiHandLandmarks[0];
    const fingers = countFingers(lm);

    console.log("JARI:", fingers);

    if(!cooldown){

      if(fingers === 2){
        alert("2 JARI TERDETEKSI");

        if(window.Android){
          Android.swipeDown();
        }

        cooldown = true;
      }

      if(fingers === 3){
        alert("3 JARI TERDETEKSI");

        if(window.Android){
          Android.swipeUp();
        }

        cooldown = true;
      }

      setTimeout(function(){
        cooldown = false;
      }, 1000);
    }

    drawConnectors(ctx, lm, HAND_CONNECTIONS, {
      color:'#00FF00',
      lineWidth:4
    });

    drawLandmarks(ctx, lm, {
      color:'#FF0000',
      lineWidth:2
    });
  }
});

// =========================
// START CAMERA (FIX)
// =========================
const camera = new Camera(video,{
  onFrame: async function () {
    await hands.send({ image: video });
  },
  width:640,
  height:480
});

// 🔥 PENTING: tunggu video ready
video.onloadeddata = function(){
  console.log("KAMERA READY");
  camera.start();
};

</script>

</body>
</html>
