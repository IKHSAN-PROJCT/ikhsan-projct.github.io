<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background: transparent;
}

video {
  display:none;
}

canvas {
  position:absolute;
  width:100%;
  height:100%;
}
</style>

</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha:true });

canvas.width = 600;
canvas.height = 600;

// =========================
// HITUNG JARI (LEBIH AKURAT)
// =========================
function countFingers(lm) {
  let count = 0;

  // Thumb (lebih aman pakai jarak)
  if (lm[4].x > lm[3].x) count++;

  // Jari lain
  if (lm[8].y < lm[6].y) count++;
  if (lm[12].y < lm[10].y) count++;
  if (lm[16].y < lm[14].y) count++;
  if (lm[20].y < lm[18].y) count++;

  return count;
}

let cooldown = false;

// =========================
// MEDIAPIPE
// =========================
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// =========================
// DETEKSI
// =========================
hands.onResults(results => {

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(results.multiHandLandmarks){

    const lm = results.multiHandLandmarks[0];
    const fingers = countFingers(lm);

    console.log("Jumlah jari:", fingers);

    if(!cooldown){

      if(fingers === 2){
        console.log("2 JARI → SWIPE DOWN");

        if(window.Android && Android.swipeDown){
          Android.swipeDown();
        }

        cooldown = true;
      }

      if(fingers === 3){
        console.log("3 JARI → SWIPE UP");

        if(window.Android && Android.swipeUp){
          Android.swipeUp();
        }

        cooldown = true;
      }

      setTimeout(function(){
        cooldown = false;
      }, 1200);
    }

    // =========================
    // GAMBAR TANGAN
    // =========================
    drawConnectors(ctx, lm, HAND_CONNECTIONS, {
      color: '#00FF00',
      lineWidth: 3
    });

    drawLandmarks(ctx, lm, {
      color: '#FF0000',
      lineWidth: 2
    });
  }
});

// =========================
// START CAMERA
// =========================
const camera = new Camera(video, {
  onFrame: async function () {
    await hands.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();

</script>

</body>
</html>
