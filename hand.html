<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Gesture Pro</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    overflow: hidden;
    color: white;
  }

  /* HEADER */
  .header {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    z-index: 10;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    opacity: 0.9;
  }

  /* GLASS PANEL */
  .panel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 400px;
    padding: 15px;
    border-radius: 20px;

    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);

    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }

  .panel h2 {
    font-size: 16px;
    opacity: 0.7;
  }

  .status {
    margin-top: 10px;
    font-size: 20px;
    font-weight: bold;
    color: #38bdf8;
  }

  /* VIDEO + CANVAS */
  video, canvas {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%) scaleX(1); /* Tidak mirror */
  }

  /* GLOW EFFECT */
  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(56,189,248,0.3), transparent);
    border-radius: 50%;
    filter: blur(60px);
    animation: pulse 3s infinite;
    pointer-events: none;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 0.6; }
  }
</style>
</head>

<body>

<div class="header">
  <h1>✋ Hand Gesture Pro</h1>
</div>

<div class="glow"></div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="panel">
  <h2>Gesture Status</h2>
  <div class="status" id="statusText">Menunggu...</div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const statusText = document.getElementById('statusText');
const canvasCtx = canvasElement.getContext('2d');

canvasElement.width = window.innerWidth;
canvasElement.height = window.innerHeight;

let lastTrigger = 0;

// =======================
// HITUNG JARI
// =======================
function countFingers(landmarks) {
  let fingers = 0;
  const tips = [8, 12, 16, 20];

  for (let tip of tips) {
    if (landmarks[tip].y < landmarks[tip - 2].y) {
      fingers++;
    }
  }

  if (landmarks[4].x > landmarks[3].x) {
    fingers++;
  }

  return fingers;
}

// =======================
// KIRIM KE ANDROID
// =======================
function sendCommand() {
  if (window.Android && window.Android.swipeDown) {
    window.Android.swipeDown();
    statusText.innerText = "⬇️ Swipe Down!";
  }
}

// =======================
// MAIN
// =======================
function onResults(results) {
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

  // Flip horizontal canvas agar kamera tidak mirror
  canvasCtx.scale(-1, 1);
  canvasCtx.drawImage(results.image, -canvasElement.width, 0, canvasElement.width, canvasElement.height);

  if (results.multiHandLandmarks) {
    for (const landmarks of results.multiHandLandmarks) {

      drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
        {color: '#38bdf8', lineWidth: 4});

      drawLandmarks(canvasCtx, landmarks,
        {color: '#f43f5e', lineWidth: 2});

      let fingerCount = countFingers(landmarks);

      statusText.innerText = "Jari: " + fingerCount;

      // DETEKSI 2 JARI
      if (fingerCount === 2) {
        let now = Date.now();

        if (now - lastTrigger > 1500) {
          sendCommand();
          lastTrigger = now;
        }
      }
    }
  }

  canvasCtx.restore();
}

// =======================
// MEDIAPIPE
// =======================
const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5
});

hands.onResults(onResults);

// =======================
// CAMERA
// =======================
const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({image: videoElement});
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
