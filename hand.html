<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Scroll Control</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
}

video,canvas{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

#info{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
font-size:14px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="info">
Hand Scroll Control
</div>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let lastY=null;
let lastGesture=0;

const MOVE_THRESHOLD=0.06;
const COOLDOWN=400;

function runScroll(currentY){

if(lastY==null){
lastY=currentY;
return;
}

const diff=currentY-lastY;
const now=Date.now();

if(now-lastGesture < COOLDOWN){
lastY=currentY;
return;
}

if(!window.Android){
lastY=currentY;
return;
}

if(diff < -MOVE_THRESHOLD){

Android.swipeUp();
lastGesture=now;

}

if(diff > MOVE_THRESHOLD){

Android.swipeDown();
lastGesture=now;

}

lastY=currentY;

}

const hands=new Hands({

locateFile:(file)=>{
return "https://cdn.jsdelivr.net/npm/@mediapipe/hands/"+file;
}

});

hands.setOptions({

maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7

});

hands.onResults((results)=>{

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

if(results.multiHandLandmarks){

results.multiHandLandmarks.forEach((lm)=>{

drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:"#00FF00",lineWidth:3});
drawLandmarks(ctx,lm,{color:"#FF0000",lineWidth:2});

const wrist=lm[0];

runScroll(wrist.y);

const x=Math.floor(wrist.x*screen.width);
const y=Math.floor(wrist.y*screen.height);

if(window.Android){
Android.move(x,y);
}

});

}

});

const camera=new Camera(video,{

onFrame:async ()=>{
await hands.send({image:video});
},

width:640,
height:480

});

camera.start();

</script>

</body>
</html>
