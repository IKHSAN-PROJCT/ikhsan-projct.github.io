<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Control</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
video { position:absolute; width:100%; height:100%; object-fit:cover; }
canvas { position:absolute; top:0; left:0; }
#status {
  position:absolute; top:10px; left:10px;
  color:white; background:rgba(0,0,0,0.5);
  padding:6px 10px; border-radius:6px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="status">Loading...</div>

<script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');
const statusText = document.getElementById('status');

canvasElement.width = window.innerWidth;
canvasElement.height = window.innerHeight;

let lastGestureTime = 0;
let lastX = null;
let lastY = null;

let velocityX = 0;
let velocityY = 0;

const smoothFactor = 0.7;

// ================= UTIL =================
function isFingerOpen(lm, tip, pip){
    return lm[tip].y < lm[pip].y;
}

function isOpenHand(lm){
    return isFingerOpen(lm,8,6) &&
           isFingerOpen(lm,12,10) &&
           isFingerOpen(lm,16,14) &&
           isFingerOpen(lm,20,18);
}

function isFist(lm){
    return !isFingerOpen(lm,8,6) &&
           !isFingerOpen(lm,12,10) &&
           !isFingerOpen(lm,16,14) &&
           !isFingerOpen(lm,20,18);
}

function send(cmd){
    if(window.Android){
        Android.exec(cmd);
    }
}

// ================= GESTURE =================
function detectGesture(lm){

    let now = Date.now();
    if(now - lastGestureTime < 500) return;

    let wrist = lm[0];
    let x = wrist.x;
    let y = wrist.y;

    if(lastX !== null && lastY !== null){

        let dx = x - lastX;
        let dy = y - lastY;

        velocityX = velocityX * smoothFactor + dx * (1 - smoothFactor);
        velocityY = velocityY * smoothFactor + dy * (1 - smoothFactor);

        // ================= PINCH =================
        let thumb = lm[4];
        let index = lm[8];

        let pinch = Math.hypot(
            thumb.x - index.x,
            thumb.y - index.y
        );

        if(pinch < 0.05){
            statusText.innerText = "PINCH 🤏";
            send("ZOOM");
            lastGestureTime = now;
            return;
        }

        // ================= FIST =================
        if(isFist(lm)){
            statusText.innerText = "FIST ✊";
            send("STOP");
            lastGestureTime = now;
            return;
        }

        // ================= OPEN HAND =================
        if(isOpenHand(lm)){

            // SWIPE
            if(Math.abs(velocityX) > 0.01){
                if(velocityX > 0){
                    statusText.innerText = "NEXT 👉";
                    send("NEXT");
                }else{
                    statusText.innerText = "BACK 👈";
                    send("BACK");
                }
                lastGestureTime = now;
            }

            // WAVE / SCROLL
            if(Math.abs(velocityY) > 0.01){
                statusText.innerText = "SCROLL ✋";

                if(velocityY > 0){
                    send("SCROLL_DOWN");
                }else{
                    send("SCROLL_UP");
                }

                lastGestureTime = now;
            }
        }
    }

    lastX = x;
    lastY = y;
}

// ================= MEDIAPIPE =================
const hands = new Hands({
  locateFile: (file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

hands.onResults(results=>{
    canvasCtx.clearRect(0,0,canvasElement.width,canvasElement.height);

    if(results.multiHandLandmarks.length > 0){
        const lm = results.multiHandLandmarks[0];

        drawConnectors(canvasCtx,lm,HAND_CONNECTIONS);
        drawLandmarks(canvasCtx,lm);

        detectGesture(lm);
    }else{
        statusText.innerText = "No hand detected";
    }
});

// CAMERA
const camera = new Camera(videoElement,{
    onFrame: async()=>{
        await hands.send({image:videoElement});
    },
    width:640,
    height:480
});

camera.start();
</script>
