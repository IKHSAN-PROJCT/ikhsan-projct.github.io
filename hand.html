<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eye Gaze</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
body{margin:0;overflow:hidden;background:black;}
video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// Eye landmark indices untuk kiri & kanan
const LEFT_EYE=[474,475,476,477,473,471];
const RIGHT_EYE=[469,470,471,472,468,466];

// Threshold EAR untuk kedipan
const BLINK_THRESHOLD=0.2;
let idle=false;

// Hitung Eye Aspect Ratio
function eyeAspectRatio(lm, indices){
    const a=Math.hypot(lm[indices[1]].x-lm[indices[5]].x, lm[indices[1]].y-lm[indices[5]].y);
    const b=Math.hypot(lm[indices[2]].x-lm[indices[4]].x, lm[indices[2]].y-lm[indices[4]].y);
    const c=Math.hypot(lm[indices[0]].x-lm[indices[3]].x, lm[indices[0]].y-lm[indices[3]].y);
    return (a+b)/(2*c);
}

function getEyeCenter(lm,left=true){
    const indices=left?[474,475,476,477]:[469,470,471,472];
    let cx=0,cy=0;
    for(let i of indices){ cx+=lm[i].x; cy+=lm[i].y; }
    return {x:cx/indices.length,y:cy/indices.length};
}

function runGaze(lm){
    // deteksi kedipan
    const leftEAR=eyeAspectRatio(lm,LEFT_EYE);
    const rightEAR=eyeAspectRatio(lm,RIGHT_EYE);
    idle = (leftEAR<BLINK_THRESHOLD && rightEAR<BLINK_THRESHOLD); // idle saat kedipan

    if(idle) return; // jika kedip, diam saja

    const left=getEyeCenter(lm,true);
    const right=getEyeCenter(lm,false);
    const eyeY=(left.y+right.y)/2;

    if(window.Android && typeof window.Android.scrollEye==="function"){
        window.Android.scrollEye(eyeY);
    }
}

const faceMesh=new FaceMesh({locateFile:(file)=>"https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/"+file});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.7,minTrackingConfidence:0.7});
faceMesh.onResults((results)=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks){
        results.multiFaceLandmarks.forEach(lm=>{
            drawConnectors(ctx,lm,FACEMESH_TESSELATION,{color:'#888',lineWidth:1});
            runGaze(lm);
        });
    }
});

const camera=new Camera(video,{onFrame:async()=>{await faceMesh.send({image:video})},width:640,height:480});
camera.start();
</script>
</body>
</html>
