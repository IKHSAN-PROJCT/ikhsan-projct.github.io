<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Gesture Pro</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: black;
  overflow: hidden;
  color: white;
}

.status {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  color: #38bdf8;
  background: rgba(0,0,0,0.4);
  padding: 6px 10px;
  border-radius: 10px;
}

video, canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="status" id="statusText">Loading...</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const statusText = document.getElementById('statusText');
const ctx = canvas.getContext('2d');

canvas.width = 640;
canvas.height = 480;

// =======================
// ANDROID CHECK
// =======================
function isAndroidReady() {
  return typeof Android !== "undefined" && Android.exec;
}

// =======================
// SEND COMMAND (ANTI SPAM)
// =======================
let lastSend = 0;

function send(cmd) {
  let now = Date.now();

  if (now - lastSend < 250) return;
  lastSend = now;

  if (isAndroidReady()) {
    Android.exec(cmd);
  } else {
    statusText.innerText = "❌ Android Bridge Error";
  }
}

// =======================
// HITUNG JARI
// =======================
function countFingers(lm) {
  let fingers = 0;
  const tips = [8,12,16,20];

  for (let tip of tips) {
    if (lm[tip].y < lm[tip - 2].y) fingers++;
  }

  if (lm[4].x > lm[3].x) fingers++;

  return fingers;
}

// =======================
// 2 FINGER SCROLL ENGINE
// =======================
let lastY = null;
let lastTime = 0;
let gestureActive = false;
let lastCommand = "";

// =======================
// DETECT SWIPE (2 JARI ONLY)
// =======================
function detectSwipe(lm, finger) {

  // HARUS 2 JARI
  if (finger !== 2) {
    gestureActive = false;
    lastY = null;
    return null;
  }

  const y = lm[0].y;

  // pertama kali aktif
  if (!gestureActive) {
    gestureActive = true;
    lastY = y;
    return null;
  }

  let diff = y - lastY;
  lastY = y;

  let now = Date.now();

  // delay anti spam
  if (now - lastTime < 300) return null;

  // SCROLL DOWN
  if (diff > 0.025) {
    lastTime = now;

    if (lastCommand !== "SCROLL_DOWN") {
      lastCommand = "SCROLL_DOWN";
      return "SCROLL_DOWN";
    }
  }

  // SCROLL UP
  if (diff < -0.025) {
    lastTime = now;

    if (lastCommand !== "SCROLL_UP") {
      lastCommand = "SCROLL_UP";
      return "SCROLL_UP";
    }
  }

  return null;
}

// =======================
// MAIN LOOP
// =======================
function onResults(results) {

  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.scale(-1, 1);
  ctx.drawImage(results.image, -canvas.width, 0,
                canvas.width, canvas.height);

  if (results.multiHandLandmarks) {

    for (const lm of results.multiHandLandmarks) {

      drawConnectors(ctx, lm, HAND_CONNECTIONS,
        {color: '#00FFAA', lineWidth: 2});

      drawLandmarks(ctx, lm,
        {color: '#FF0055', lineWidth: 1});

      // HITUNG JARI
      let finger = countFingers(lm);

      // DETECT SWIPE
      let swipe = detectSwipe(lm, finger);

      if (swipe === "SCROLL_DOWN") {
        send("SCROLL_DOWN");
        statusText.innerText = "👇 Scroll Bawah (2 Jari)";
      }

      else if (swipe === "SCROLL_UP") {
        send("SCROLL_UP");
        statusText.innerText = "👆 Scroll Atas (2 Jari)";
      }
    }
  } else {
    // ❌ tangan hilang → reset total
    gestureActive = false;
    lastY = null;
  }

  ctx.restore();
}

// =======================
// MEDIAPIPE SETUP
// =======================
const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.5
});

hands.onResults(onResults);

// =======================
// START CAMERA
// =======================
function startCamera() {

  try {
    const cam = new Camera(video, {
      onFrame: async () => {
        await hands.send({image: video});
      },
      width: 640,
      height: 480
    });

    cam.start();

    setTimeout(() => {
      statusText.innerText = isAndroidReady()
        ? "✅ Ready (2 Jari Aktif)"
        : "⚠️ Bridge Error";
    }, 1000);

  } catch (e) {
    statusText.innerText = "❌ Kamera Error";
    console.error(e);
  }
}

// DELAY BIAR WEBVIEW SIAP
setTimeout(startCamera, 800);

</script>

</body>
</html>
