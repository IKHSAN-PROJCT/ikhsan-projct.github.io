<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Gesture Pro</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  overflow: hidden;
  color: white;
}

/* HEADER */
.header {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
}

.header h1 {
  font-size: 20px;
  opacity: 0.8;
}

/* PANEL */
.panel {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 350px;
  padding: 12px;
  border-radius: 20px;

  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
}

.status {
  font-size: 18px;
  font-weight: bold;
  color: #38bdf8;
  text-align: center;
}

/* VIDEO + CANVAS */
video, canvas {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<div class="header">
  <h1>✋ Hand Gesture Pro</h1>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="panel">
  <div class="status" id="statusText">Menunggu...</div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const statusText = document.getElementById('statusText');
const canvasCtx = canvasElement.getContext('2d');

canvasElement.width = window.innerWidth;
canvasElement.height = window.innerHeight;

let lastTrigger = 0;

// =======================
// HITUNG JARI
// =======================
function countFingers(landmarks) {
  let fingers = 0;
  const tips = [8, 12, 16, 20];

  for (let tip of tips) {
    if (landmarks[tip].y < landmarks[tip - 2].y) {
      fingers++;
    }
  }

  if (landmarks[4].x > landmarks[3].x) {
    fingers++;
  }

  return fingers;
}

// =======================
// KIRIM KE ANDROID
// =======================
function send(cmd) {
  if (window.Android && window.Android.exec) {
    window.Android.exec(cmd);
  }
}

// =======================
// MAIN LOOP
// =======================
function onResults(results) {
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

  // ❌ NO MIRROR
  canvasCtx.scale(-1, 1);
  canvasCtx.drawImage(results.image, -canvasElement.width, 0,
                      canvasElement.width, canvasElement.height);

  if (results.multiHandLandmarks) {
    for (const landmarks of results.multiHandLandmarks) {

      drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
        {color: '#38bdf8', lineWidth: 3});

      drawLandmarks(canvasCtx, landmarks,
        {color: '#f43f5e', lineWidth: 2});

      let fingerCount = countFingers(landmarks);
      statusText.innerText = "Jari: " + fingerCount;

      let now = Date.now();

      if (now - lastTrigger > 1500) {

        // =======================
        // GESTURE MAPPING
        // =======================

        if (fingerCount === 1) {
          send("TAP");
          statusText.innerText = "👆 Tap";
        }

        else if (fingerCount === 2) {
          send("SCROLL_DOWN");
          statusText.innerText = "⬇️ Scroll";
        }

        else if (fingerCount === 3) {
          send("BACK");
          statusText.innerText = "🔙 Back";
        }

        else if (fingerCount === 5) {
          send("HOME");
          statusText.innerText = "🏠 Home";
        }

        lastTrigger = now;
      }
    }
  }

  canvasCtx.restore();
}

// =======================
// MEDIAPIPE SETUP
// =======================
const hands = new Hands({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5
});

hands.onResults(onResults);

// =======================
// CAMERA START
// =======================
const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({image: videoElement});
  },
  width: 640,
  height: 480
});

camera.start();
</script>

</body>
</html>
