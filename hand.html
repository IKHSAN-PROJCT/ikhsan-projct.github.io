<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Gesture Pro</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: black;
  overflow: hidden;
  color: white;
}

/* STATUS */
.status {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  color: #38bdf8;
  background: rgba(0,0,0,0.4);
  padding: 6px 10px;
  border-radius: 10px;
}

/* VIDEO + CANVAS */
video, canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="status" id="statusText">Loading...</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const statusText = document.getElementById('statusText');
const ctx = canvas.getContext('2d');

canvas.width = 640;
canvas.height = 480;

// =======================
// ANDROID CHECK
// =======================
function isAndroidReady() {
  return window.Android && window.Android.exec;
}

// =======================
// SEND COMMAND
// =======================
function send(cmd) {
  if (isAndroidReady()) {
    window.Android.exec(cmd);
  } else {
    statusText.innerText = "❌ Android not connected";
  }
}

// =======================
// TRACK GERAKAN TANGAN
// =======================
let lastY = null;
let lastTime = 0;

function detectSwipe(landmarks) {
  const y = landmarks[0].y; // posisi tangan

  if (lastY === null) {
    lastY = y;
    return null;
  }

  let diff = y - lastY;
  lastY = y;

  let now = Date.now();

  if (now - lastTime < 800) return null;

  // ↓ scroll TikTok
  if (diff > 0.08) {
    lastTime = now;
    return "SCROLL_DOWN";
  }

  // ↑ scroll atas
  if (diff < -0.08) {
    lastTime = now;
    return "SCROLL_UP";
  }

  return null;
}

// =======================
// HITUNG JARI (OPTIONAL)
// =======================
function countFingers(lm) {
  let fingers = 0;
  const tips = [8,12,16,20];

  for (let tip of tips) {
    if (lm[tip].y < lm[tip - 2].y) fingers++;
  }

  if (lm[4].x > lm[3].x) fingers++;

  return fingers;
}

// =======================
// MAIN LOOP
// =======================
function onResults(results) {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ❌ NO MIRROR
  ctx.scale(-1, 1);
  ctx.drawImage(results.image, -canvas.width, 0,
                canvas.width, canvas.height);

  if (results.multiHandLandmarks) {
    for (const lm of results.multiHandLandmarks) {

      drawConnectors(ctx, lm, HAND_CONNECTIONS,
        {color: '#00FFAA', lineWidth: 2});

      drawLandmarks(ctx, lm,
        {color: '#FF0055', lineWidth: 1});

      // =======================
      // DETEKSI SWIPE
      // =======================
      let swipe = detectSwipe(lm);

      if (swipe === "SCROLL_DOWN") {
        send("SCROLL_DOWN");
        statusText.innerText = "⬇️ Scroll TikTok";
      }

      else if (swipe === "SCROLL_UP") {
        send("SCROLL_UP");
        statusText.innerText = "⬆️ Scroll Atas";
      }

      // =======================
      // OPTIONAL GESTURE TAMBAHAN
      // =======================
      let finger = countFingers(lm);

      if (finger === 5) {
        send("HOME");
        statusText.innerText = "🏠 HOME";
      }

      if (finger === 3) {
        send("BACK");
        statusText.innerText = "🔙 BACK";
      }
    }
  }

  ctx.restore();
}

// =======================
// MEDIAPIPE SETUP
// =======================
const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5
});

hands.onResults(onResults);

// =======================
// START CAMERA
// =======================
function startCamera() {
  try {
    const cam = new Camera(video, {
      onFrame: async () => {
        await hands.send({image: video});
      },
      width: 640,
      height: 480
    });

    cam.start();

    statusText.innerText = isAndroidReady()
      ? "✅ Ready (Gesture Aktif)"
      : "⚠️ Android Bridge Error";

  } catch (e) {
    statusText.innerText = "❌ Kamera Error";
    console.error(e);
  }
}

// delay biar WebView siap
setTimeout(startCamera, 500);

</script>

</body>
</html>
