<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Index Finger Scroll Control</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
}

video,canvas{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

#info{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
font-size:14px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="info">
Index Finger Scroll Control
</div>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight


/* =========================
   VARIABLE GESTURE
========================= */

let lastFingerY=null
let smoothedY=null

let lastGesture=0
let directionLock=0

const MOVE_THRESHOLD=0.05
const STOP_THRESHOLD=0.015
const COOLDOWN=450


/* =========================
   SMOOTHING FILTER
========================= */

function smooth(value){

if(smoothedY==null){
smoothedY=value
}else{

smoothedY = smoothedY*0.7 + value*0.3

}

return smoothedY
}


/* =========================
   SCROLL DETECTOR
========================= */

function runScroll(currentY){

currentY = smooth(currentY)

if(lastFingerY==null){
lastFingerY=currentY
return
}

const diff=currentY-lastFingerY
const now=Date.now()

/* deadzone supaya tidak bergerak saat tangan diam */

if(Math.abs(diff) < STOP_THRESHOLD){
directionLock=0
lastFingerY=currentY
return
}

/* cooldown supaya tidak spam swipe */

if(now-lastGesture < COOLDOWN){
lastFingerY=currentY
return
}

if(!window.Android){
lastFingerY=currentY
return
}


/* TELUNJUK NAIK -> SCROLL BAWAH */

if(diff < -MOVE_THRESHOLD && directionLock!=1){

Android.swipeUp()

directionLock=1
lastGesture=now

}


/* TELUNJUK TURUN -> SCROLL ATAS */

if(diff > MOVE_THRESHOLD && directionLock!=-1){

Android.swipeDown()

directionLock=-1
lastGesture=now

}

lastFingerY=currentY

}


/* =========================
   MEDIAPIPE HANDS
========================= */

const hands=new Hands({

locateFile:(file)=>{
return "https://cdn.jsdelivr.net/npm/@mediapipe/hands/"+file
}

})


hands.setOptions({

maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7

})


hands.onResults((results)=>{

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(results.image,0,0,canvas.width,canvas.height)


if(results.multiHandLandmarks){

results.multiHandLandmarks.forEach((lm)=>{

drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:"#00FF00",lineWidth:3})
drawLandmarks(ctx,lm,{color:"#FF0000",lineWidth:2})

/* landmark telunjuk */

const finger=lm[8]

runScroll(finger.y)


/* gerakkan floating window */

const x=Math.floor(finger.x*screen.width)
const y=Math.floor(finger.y*screen.height)

if(window.Android){
Android.move(x,y)
}

})

}

})


/* =========================
   CAMERA
========================= */

const camera=new Camera(video,{

onFrame:async ()=>{
await hands.send({image:video})
},

width:640,
height:480

})

camera.start()

</script>

</body>
</html>
