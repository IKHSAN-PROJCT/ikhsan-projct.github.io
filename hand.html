<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hand Detector</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px;
      border-radius: 5px;
      font-family: Arial;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="status">Loading...</div>

<script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');
const statusText = document.getElementById('status');

canvasElement.width = window.innerWidth;
canvasElement.height = window.innerHeight;

let lastY = null;
let lastTime = 0;

// ================= HANDS =================
const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(onResults);

// ================= CAMERA =================
const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({ image: videoElement });
  },
  width: 640,
  height: 480
});

camera.start();

// ================= DETECTION =================
function onResults(results) {
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

    const landmarks = results.multiHandLandmarks[0];

    // Ambil posisi palm (landmark 0)
    let y = landmarks[0].y * canvasElement.height;

    detectGesture(y);

    statusText.innerText = "Hand detected";

    // Draw landmarks
    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS);
    drawLandmarks(canvasCtx, landmarks);

  } else {
    statusText.innerText = "No hand";
  }
}

// ================= GESTURE LOGIC =================
let lastScrollTime = 0;
const SCROLL_DELAY = 400;

function detectGesture(y) {
  let now = Date.now();

  if (now - lastScrollTime < SCROLL_DELAY) return;

  if (lastY === null) {
    lastY = y;
    return;
  }

  let diff = y - lastY;

  if (Math.abs(diff) > 30) {

    if (diff > 0) {
      statusText.innerText = "SCROLL DOWN";

      if (window.Android) {
        Android.exec("SCROLL_DOWN");
      }

    } else {
      statusText.innerText = "SCROLL UP";

      if (window.Android) {
        Android.exec("SCROLL_UP");
      }
    }

    lastScrollTime = now;
    lastY = y;
  }
}
</script>

</body>
</html>
