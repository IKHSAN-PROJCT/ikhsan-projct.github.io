<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Gesture Scroll & Click</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial; }
video,canvas { position:absolute; width:100%; height:100%; object-fit:cover; }
#info { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); padding:10px; border-radius:10px; font-size:14px; }
</style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="info">Hand Gesture Control</div>

<script>
const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
canvas.width=window.innerWidth
canvas.height=window.innerHeight

let lastFingerY=null

function isFingerUp(lm,mcp,pip,dip,tip){
    // sederhana: jarum terbuka jika ujung > sendi pip
    return lm[tip].y < lm[pip].y
}

function countFingers(lm){
    let count=0
    // Telunjuk
    if(isFingerUp(lm,5,6,7,8)) count++
    // Tengah
    if(isFingerUp(lm,9,10,11,12)) count++
    // Manis
    if(isFingerUp(lm,13,14,15,16)) count++
    // Kelingking
    if(isFingerUp(lm,17,18,19,20)) count++
    // ibu jari sederhana: bandingkan x
    if(lm[4].x < lm[3].x) count++
    return count
}

function runGesture(lm){
    const fingers = countFingers(lm)

    if(fingers==1){
        // 1 jari -> scroll bawah
        if(window.Android) Android.swipeDown()
    } else if(fingers==2){
        // 2 jari -> scroll atas
        if(window.Android) Android.swipeUp()
    } else if(fingers==0){
        // tangan mengepal -> klik tengah
        if(window.Android) Android.click()
    }
}

const hands=new Hands({locateFile:(file)=>"https://cdn.jsdelivr.net/npm/@mediapipe/hands/"+file})

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
})

hands.onResults((results)=>{
    ctx.clearRect(0,0,canvas.width,canvas.height)
    ctx.drawImage(results.image,0,0,canvas.width,canvas.height)

    if(results.multiHandLandmarks){
        results.multiHandLandmarks.forEach(lm=>{
            drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:"#00FF00",lineWidth:3})
            drawLandmarks(ctx,lm,{color:"#FF0000",lineWidth:2})
            runGesture(lm)
        })
    }
})

const camera=new Camera(video,{
    onFrame:async()=>{await hands.send({image:video})},
    width:640,height:480
})
camera.start()
</script>
</body>
</html>
