<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Kamera Stabil Fix</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: transparent;
}

video, canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#hasil {
  position: fixed;
  bottom: 10px;
  left: 10px;
  width: 120px;
  border: 2px solid white;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<img id="hasil"/>

<!-- FACE API -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<!-- MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const hasil = document.getElementById("hasil");

let lastCapture = 0;
const cooldown = 3000;

// ======================
// FACE DATA
// ======================
let labeledFaceDescriptors = [];

// ======================
// ERROR DEBUG
// ======================
window.onerror = function(msg, source, line, col, err) {
  console.log("❌ ERROR:", msg, line);
};

// ======================
// LOAD FACE MODELS
// ======================
async function loadFaceModels() {
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models');
    await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models');
    await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models');

    console.log("✅ Face models loaded");
  } catch (e) {
    console.log("❌ Face model error:", e);
  }
}

// ======================
// ENROLL
// ======================
async function enrollUser(label, descriptor) {
  labeledFaceDescriptors.push(
    new faceapi.LabeledFaceDescriptors(label, [descriptor])
  );

  if (window.Android) {
    Android.responPerintah("Wajah tersimpan untuk " + label);
  }
}

// ======================
// RECOGNITION
// ======================
function recognizeFace(descriptor) {
  if (labeledFaceDescriptors.length === 0) return null;

  const matcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.5);
  return matcher.findBestMatch(descriptor).label;
}

// ======================
// ✌️ 2 FINGER
// ======================
function isTwoFingers(landmarks) {
  return landmarks[8].y < landmarks[6].y &&
         landmarks[12].y < landmarks[10].y &&
         landmarks[16].y > landmarks[14].y &&
         landmarks[20].y > landmarks[18].y;
}

// ======================
// CAMERA (WAJIB FIX)
// ======================
async function startCamera() {
  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "user",
        width: 1280,
        height: 720
      },
      audio: false
    });

    video.srcObject = stream;

    await new Promise(resolve => {
      video.onloadedmetadata = () => {
        video.play();
        resolve();
      };
    });

    console.log("✅ Kamera ON");

  } catch (e) {
    console.log("❌ Kamera error:", e);
  }
}

// ======================
// HANDS
// ======================
const hands = new Hands({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// ======================
// LOOP
// ======================
hands.onResults(async (results) => {

  if (!video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(results.image, 0, 0);

  // FACE DETECTION SAFE
  try {
    const detections = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (detections) {

      let label = recognizeFace(detections.descriptor);

      if (label && window.Android) {
        Android.responPerintah("Halo " + label);
      } else {
        await enrollUser("User1", detections.descriptor);
      }
    }

  } catch (e) {
    console.log("Face error:", e);
  }

  // HAND DRAW
  if (results.multiHandLandmarks) {
    for (const lm of results.multiHandLandmarks) {

      drawConnectors(ctx, lm, HAND_CONNECTIONS, {
        color: "#00FF00",
        lineWidth: 4
      });

      drawLandmarks(ctx, lm, {
        color: "#FF0000",
        lineWidth: 2
      });

      if (isTwoFingers(lm)) {
        const now = Date.now();
        if (now - lastCapture > cooldown) {
          ambilFoto();
          lastCapture = now;
        }
      }
    }
  }
});

// ======================
// FOTO
// ======================
function ambilFoto() {

  const temp = document.createElement("canvas");
  temp.width = video.videoWidth;
  temp.height = video.videoHeight;

  const tctx = temp.getContext("2d");
  tctx.drawImage(video, 0, 0);

  const base64 = temp.toDataURL("image/jpeg", 1.0);

  hasil.src = base64;

  if (window.Android && Android.kirimFoto) {
    Android.kirimFoto(base64);
  }

  console.log("📸 FOTO OK");
}

// ======================
// START SYSTEM
// ======================
async function start() {

  await loadFaceModels();
  await startCamera();

  setTimeout(() => {

    const camera = new Camera(video, {
      onFrame: async () => {
        if (video.readyState >= 2) {
          await hands.send({ image: video });
        }
      },
      width: 1280,
      height: 720
    });

    camera.start();

    console.log("🚀 SYSTEM READY");

  }, 1000);
}

start();

</script>

</body>
</html>
