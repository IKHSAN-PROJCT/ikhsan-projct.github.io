<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Kamera FULL STABLE</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video, canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#hasil {
  position: fixed;
  bottom: 10px;
  left: 10px;
  width: 120px;
  border: 2px solid white;
  z-index: 10;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<img id="hasil"/>

<!-- FACE API -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<!-- MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const hasil = document.getElementById("hasil");

let lastCapture = 0;
const cooldown = 3000;

// ================= FACE DATA =================
let labeledFaceDescriptors = [];
let faceReady = false;

// ================= ERROR =================
window.onerror = (m, s, l) => console.log("ERROR:", m, l);

// ================= LOAD FACE MODELS =================
async function loadFaceModels() {
  const url = "https://cdn.jsdelivr.net/npm/face-api.js/models";

  await faceapi.nets.tinyFaceDetector.loadFromUri(url);
  await faceapi.nets.faceRecognitionNet.loadFromUri(url);
  await faceapi.nets.faceLandmark68Net.loadFromUri(url);

  faceReady = true;
  console.log("FACE READY");
}

// ================= CAMERA =================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "user",
      width: 1280,
      height: 720
    },
    audio: false
  });

  video.srcObject = stream;

  await new Promise(r => {
    video.onloadedmetadata = () => {
      video.play();
      r();
    };
  });

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  console.log("CAMERA ON");
}

// ================= FACE =================
function recognizeFace(descriptor) {
  if (!labeledFaceDescriptors.length) return null;

  const matcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.5);
  return matcher.findBestMatch(descriptor).label;
}

async function enrollUser(label, descriptor) {
  labeledFaceDescriptors.push(
    new faceapi.LabeledFaceDescriptors(label, [descriptor])
  );

  if (window.Android) Android.responPerintah("Wajah tersimpan: " + label);
}

// ================= HAND RULE =================
function isTwoFingers(lm) {
  return lm[8].y < lm[6].y &&
         lm[12].y < lm[10].y &&
         lm[16].y > lm[14].y &&
         lm[20].y > lm[18].y;
}

// ================= HANDS =================
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// ================= HAND RESULT =================
hands.onResults(async (results) => {

  if (!video.videoWidth) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ================= FACE DETECT (SAFE THROTTLE) =================
  if (faceReady) {
    try {
      const det = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceLandmarks()
        .withFaceDescriptor();

      if (det) {
        let label = recognizeFace(det.descriptor);

        if (!label) {
          await enrollUser("User1", det.descriptor);
        } else {
          if (window.Android) {
            Android.responPerintah("Halo " + label);
          }
        }
      }

    } catch (e) {
      console.log("FACE ERROR:", e);
    }
  }

  // ================= HAND DRAW =================
  if (results.multiHandLandmarks) {
    for (const lm of results.multiHandLandmarks) {

      drawConnectors(ctx, lm, HAND_CONNECTIONS, {
        color: "#00FF00",
        lineWidth: 3
      });

      drawLandmarks(ctx, lm, {
        color: "#FF0000",
        lineWidth: 2
      });

      if (isTwoFingers(lm)) {
        const now = Date.now();
        if (now - lastCapture > cooldown) {
          ambilFoto();
          lastCapture = now;
        }
      }
    }
  }
});

// ================= HAND LOOP (CAMERA UTAMA MEDIAPIPE) =================
function startHandsCamera() {
  const camera = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
    },
    width: 1280,
    height: 720
  });

  camera.start();
  console.log("MEDIAPIPE CAMERA START");
}

// ================= FOTO =================
function ambilFoto() {
  const temp = document.createElement("canvas");
  temp.width = video.videoWidth;
  temp.height = video.videoHeight;

  temp.getContext("2d").drawImage(video, 0, 0);

  const base64 = temp.toDataURL("image/jpeg", 0.9);

  hasil.src = base64;

  if (window.Android?.kirimFoto) {
    Android.kirimFoto(base64);
  }

  console.log("FOTO OK");
}

// ================= START SYSTEM =================
async function start() {

  await loadFaceModels();
  await startCamera();

  console.log("SYSTEM START");

  startHandsCamera();
}

start();

</script>

</body>
</html>
